---
- name: Provision all testbed VMs
  hosts: all
  become: true
  roles:
    - common
    - kernel

- name: Provision VTEP dataplane prerequisites
  hosts: vteps
  become: true
  roles:
    - hugepages
    - dpdk

- name: Provision client traffic generator prerequisites
  hosts: clients
  become: true
  roles:
    - hugepages
    - traffic-tools

- name: Configure Linux VXLAN reference topology
  hosts: all
  become: true
  roles:
    - vxlan-test
