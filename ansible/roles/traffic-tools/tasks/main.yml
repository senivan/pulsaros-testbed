---
- name: Install pktgen-dpdk prerequisites
  ansible.builtin.shell: |
    set -euo pipefail
    dnf install -y \
      dpdk \
      dpdk-devel \
      gcc \
      git \
      libbsd-devel \
      libpcap-devel \
      lua-devel \
      make \
      meson \
      ninja-build \
      numactl-devel \
      pkgconf-pkg-config
  args:
    executable: /bin/bash
  changed_when: false

- name: Try to install pktgen-dpdk package
  ansible.builtin.shell: |
    set -euo pipefail
    dnf install -y pktgen-dpdk || dnf install -y pktgen || true
  args:
    executable: /bin/bash
  changed_when: false

- name: Check for pktgen-dpdk
  ansible.builtin.shell: command -v pktgen-dpdk
  register: pktgen_dpdk
  changed_when: false
  failed_when: false

- name: Check for pktgen
  ansible.builtin.shell: command -v pktgen
  register: pktgen
  changed_when: false
  failed_when: false

- name: Build pktgen-dpdk from source when no package binary exists
  ansible.builtin.shell: |
    set -euo pipefail
    prefix=/opt/pulsaros/pktgen-dpdk
    source_dir="${prefix}/source"
    ref="${PKTGEN_DPDK_REF:-pktgen-24.10.3}"

    mkdir -p "${prefix}"
    if [ ! -d "${source_dir}/.git" ]; then
      rm -rf "${source_dir}"
      git clone --depth 1 --branch "${ref}" https://github.com/pktgen/Pktgen-DPDK.git "${source_dir}"
    else
      git -C "${source_dir}" fetch --depth 1 origin "${ref}"
      git -C "${source_dir}" checkout --force FETCH_HEAD
    fi

    cd "${source_dir}"
    python3 - <<'PY'
    from pathlib import Path

    path = Path("app/pktgen.c")
    text = path.read_text()
    replacements = [
        (
            "    return (size * 8);\n",
            "    if (size == 0)\n"
            "        size = WIRE_SIZE(RTE_ETHER_MIN_LEN, uint64_t);\n"
            "    return (size * 8);\n",
        ),
        (
            "    wire_size = pktgen_wire_size(port);\n    if (port->link.link_speed == 0) {\n",
            "    wire_size = pktgen_wire_size(port);\n"
            "    if (wire_size == 0 || port->link.link_speed == 0) {\n",
        ),
        (
            "    uint64_t link_speed, pps, cpb, txcnt;\n",
            "    uint64_t link_speed, wire_size, pps, cpb, txcnt;\n",
        ),
        (
            "    txcnt = l2p_get_txcnt(port->pid);\n\n"
            "    // packets per second per thread based on requested (tx_rate/txcnt)\n"
            "    pps = (((link_speed / pktgen_wire_size(port)) * (port->tx_rate / txcnt)) / 100);\n",
            "    txcnt     = l2p_get_txcnt(port->pid);\n"
            "    wire_size = pktgen_wire_size(port);\n"
            "    if (wire_size == 0 || txcnt == 0) {\n"
            "        port->tx_cycles = 0;\n"
            "        port->tx_pps    = 0;\n"
            "        return;\n"
            "    }\n\n"
            "    // packets per second per thread based on requested (tx_rate/txcnt)\n"
            "    pps = (((link_speed / wire_size) * (port->tx_rate / txcnt)) / 100);\n",
        ),
    ]
    applied = 0
    for old, new in replacements:
        if old in text:
            text = text.replace(old, new, 1)
            applied += 1
    if applied < 2:
        raise SystemExit("pktgen rate patch targets not found")
    path.write_text(text)

    path = Path("lib/common/coreinfo.c")
    text = path.read_text()
    old = (
        "    hmap_get_u16(cid->map, NULL, CI_NUM_CPU_CORES, &num_cpu_cores);\n"
        "    hmap_get_u16(cid->map, NULL, CI_NUM_SOCKETS, &num_sockets);\n"
        "    if (num_sockets == 0)\n"
        "        num_sockets = 1;\n"
    )
    new = (
        "    hmap_get_u16(cid->map, NULL, CI_NUM_CPU_CORES, &num_cpu_cores);\n"
        "    hmap_get_u16(cid->map, NULL, CI_NUM_SOCKETS, &num_sockets);\n"
        "    if (num_cpu_cores == 0)\n"
        "        num_cpu_cores = 1;\n"
        "    if (num_sockets == 0)\n"
        "        num_sockets = 1;\n"
    )
    if old not in text:
        raise SystemExit("pktgen coreinfo patch target not found")
    path.write_text(text.replace(old, new, 1))
    PY
    rm -rf builddir
    meson setup builddir \
      -Denable_lua=true \
      -Denable_docs=false \
      -Denable-avx=false \
      -Denable-avx2=false \
      -Dwerror=false
    meson compile -C builddir

    install -D -m 0755 builddir/app/pktgen /usr/local/libexec/pulsaros/pktgen-dpdk/pktgen
    install -D -m 0644 Pktgen.lua /usr/local/share/pulsaros-pktgen/Pktgen.lua
    ln -sfn /usr/local/libexec/pulsaros/pktgen-dpdk/pktgen /usr/local/bin/pktgen-dpdk
    ldconfig
  args:
    executable: /bin/bash
  changed_when: true
  when: pktgen_dpdk.rc != 0 and pktgen.rc != 0

- name: Verify pktgen-dpdk is available
  ansible.builtin.shell: command -v pktgen-dpdk || command -v pktgen
  changed_when: false
